# goreleaser v2 configuration for the LeanSignal Agent.
#
# The collector distribution source is generated by OCB into _build/ BEFORE
# goreleaser runs (see Makefile `generate` / the release workflow). goreleaser
# then cross-compiles that generated main package, packages archives + multi-arch
# images, and publishes the GitHub release.
#
# VictoriaMetrics mirroring and the combined per-platform bundles are produced
# AFTER this run by scripts/release/build-bundles.sh and uploaded to the same
# release (they need the binaries goreleaser builds first).
version: 2

project_name: leansignal-agent

builds:
  - id: leansignal-agent
    dir: _build
    main: .
    binary: leansignal-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: collector
    ids:
      - leansignal-agent
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - README.md
      - src: config/agent-config.example.yaml
        dst: config
      - src: scripts/install/service-templates/*
        dst: service-templates

checksum:
  name_template: "checksums.txt"

dockers:
  - id: linux-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/leansignal/leansignal-agent:{{ .Version }}-amd64"
      - "ghcr.io/leansignal/leansignal-agent:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/LeanSignal/leansignal-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    extra_files:
      - config/agent-config.example.yaml
  - id: linux-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/leansignal/leansignal-agent:{{ .Version }}-arm64"
      - "ghcr.io/leansignal/leansignal-agent:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/LeanSignal/leansignal-agent"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    extra_files:
      - config/agent-config.example.yaml

docker_manifests:
  - name_template: "ghcr.io/leansignal/leansignal-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/leansignal/leansignal-agent:{{ .Version }}-amd64"
      - "ghcr.io/leansignal/leansignal-agent:{{ .Version }}-arm64"
  - name_template: "ghcr.io/leansignal/leansignal-agent:latest"
    image_templates:
      - "ghcr.io/leansignal/leansignal-agent:latest-amd64"
      - "ghcr.io/leansignal/leansignal-agent:latest-arm64"

# Optional supply-chain hardening for a future release (require syft / cosign):
# sboms:
#   - artifacts: archive
# signs:
#   - cmd: cosign
#     artifacts: checksum

release:
  github:
    owner: LeanSignal
    name: leansignal-agent
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
