# goreleaser v2 configuration for the LeanSignal Agent.
#
# The collector distribution source is generated by OCB into _build/ BEFORE
# goreleaser runs (see Makefile `generate` / the release workflow). goreleaser
# then cross-compiles that generated main package, packages archives + multi-arch
# images, and publishes the GitHub release.
#
# VictoriaMetrics mirroring and the combined per-platform bundles are produced
# AFTER this run by scripts/release/build-bundles.sh and uploaded to the same
# release (they need the binaries goreleaser builds first).
version: 2

project_name: leansignal-agent

builds:
  - id: leansignal-agent
    dir: _build
    main: .
    binary: leansignal-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: collector
    ids:
      - leansignal-agent
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - README.md
      - src: config/agent-config.example.yaml
        dst: config
      - src: scripts/install/service-templates/*
        dst: service-templates

checksum:
  name_template: "checksums.txt"

# NOTE: Docker images are intentionally NOT built here. The self-hosted K8s runner
# that does the (heavy) cross-compile has no Docker daemon, and goreleaser builds
# on one runner. So the release workflow (.github/workflows/release.yml) builds the
# images on free GitHub-hosted runners instead — each arch natively (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm) from the archives goreleaser produces
# above — then merges them into a multi-arch manifest. goreleaser here owns only
# the binaries, archives, checksums, and the GitHub release.

# Optional supply-chain hardening for a future release (require syft / cosign):
# sboms:
#   - artifacts: archive
# signs:
#   - cmd: cosign
#     artifacts: checksum

release:
  github:
    owner: LeanSignal
    name: leansignal-agent
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
