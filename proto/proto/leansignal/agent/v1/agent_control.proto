// LeanSignal agent control-plane protocol, v1.
//
// The agent (in a private network) dials out to lean-api and opens ONE long-lived
// bidirectional stream (AgentControl.Connect). Both directions carry a oneof
// envelope; the server can push commands to the agent over the open stream, so no
// inbound connectivity to the agent is required. Authentication is via the
// "x-agent-key" gRPC metadata header on stream open.
//
// Versioning: breaking changes mint a new package (leansignal.agent.v2, ...).
// lean-api registers the last N service versions concurrently so mixed agent
// fleets keep working. Additive (non-breaking) field changes stay within v1.
syntax = "proto3";

package leansignal.agent.v1;

option go_package = "github.com/leansignal/leansignal-agent/proto/gen/leansignal/agent/v1;agentv1";

// AgentControl is the bidirectional control channel between an agent and lean-api.
service AgentControl {
  // Connect opens the persistent control stream. The agent authenticates with the
  // "x-agent-key" metadata header. It stays open for the lifetime of the agent's
  // connection; either side may send messages at any time.
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);
}

// Label is a single metric label (key/value).
message Label {
  string name = 1;
  string value = 2;
}

// DiscoveredSeries is a newly-seen timeseries reported to the index.
message DiscoveredSeries {
  bytes fingerprint = 1;   // 16-byte xxh3-128 of the series
  string metric_name = 2;
  repeated Label labels = 3;
}

// ActiveSeries refreshes sample counts for a known timeseries.
message ActiveSeries {
  bytes fingerprint = 1;
  int64 samples = 2;
  int64 last_update_ms = 3; // unix millis
}

// ---- agent -> server bodies ----

message Hello {
  string version = 1;
}

message Ping {
  int32 known_cache_size = 1;
  int32 discovered_cache_size = 2;
  int32 pending_backend_updates = 3;
  int32 demand_cache_size = 4;
  int64 demand_last_update = 5;
  // Known series matching the current demand set — the "stored" count that
  // actually reaches the dataplane VM.
  int32 demanded_known_cache_size = 6;
  // Echo of the last applied DemandSet.hash (0 = none applied yet). The server
  // re-pushes the demand set when this differs from the current hash.
  uint64 demand_hash = 7;
}

message IndexCreate { repeated DiscoveredSeries series = 1; }
message IndexUpdate { repeated ActiveSeries series = 1; }
message IndexDelete { repeated bytes fingerprints = 1; }

// CommandResult is the agent's reply to a server-initiated command.
message CommandResult {
  bool success = 1;
  string message = 2;
}

// ---- server -> agent bodies ----

message Pong {}

// Ack acknowledges an agent-initiated message (index op / ping) by correlation_id.
message Ack {
  bool success = 1;
  string message = 2;
}

// DemandSet pushes the full demand set: Prometheus metric names, LogQL
// stream selectors, and trace resource selectors.
message DemandSet {
  repeated string metrics = 1;
  // FNV-1a 64 content hash of the demand set (sorted, domain-prefixed entries
  // covering metrics, log_selectors AND trace_selectors). The agent stores it
  // and echoes it in Ping.demand_hash so the server can detect missed updates.
  uint64 hash = 2;
  // Normalized LogQL stream selectors (e.g. `{service_name="api"}`) demanded
  // by saved dashboards. The agent forwards only matching log streams to the
  // tenant Loki; an empty list blocks all logs (fail-closed).
  repeated string log_selectors = 3;
  // Normalized trace resource selectors (e.g.
  // `{resource.service.name="checkout"}`) demanded by saved dashboards. The
  // agent forwards only spans whose resource attributes match a selector to
  // the tenant Tempo; an empty list blocks all traces (fail-closed).
  repeated string trace_selectors = 4;
  // Normalized PromQL series selectors (e.g.
  // `{__name__="node_cpu_seconds_total",cpu=~"0|3",mode!="idle"}`) extracted
  // from dashboard/alert PromQL. Agents that understand this field filter
  // metrics at SERIES granularity (matching Prometheus label semantics after
  // remote-write translation); `metrics` (field 1) stays populated with the
  // plain name parts as a superset fallback for older agents. `le`/`quantile`
  // matchers are ignored agent-side (those labels only materialize at
  // remote-write); an empty list blocks all metrics (fail-closed).
  repeated string metric_selectors = 5;
  // The SAME trace selectors as field 4, each paired with the id of the filter
  // it came from, so the agent can route matching spans to a per-rule Tempo org
  // (`<tenant>__<filter_id>`) instead of one org per tenant.
  //
  // Why the org matters: Tempo has no selective delete. Deleting one trace
  // ingestion rule can only expire data at org granularity, so a rule's spans
  // must land in their own org to be purgeable at all — otherwise removing a
  // rule leaves its spans until the tenant-wide retention expires them.
  //
  // Field 4 stays populated verbatim for agents that predate this field: they
  // keep filtering identically and keep pushing to the tenant-wide org, so an
  // old agent degrades to today's behaviour rather than breaking. A resource
  // matched by several rules is exported once PER matching rule (duplicated) —
  // that duplication is the price of per-rule deletion.
  repeated TraceDemand trace_demands = 6;
}

// TraceDemand is one trace resource selector plus the identity of the demand-set
// filter that asked for it.
message TraceDemand {
  // Normalized trace resource selector, identical in form to DemandSet.trace_selectors.
  string selector = 1;
  // The `filters` row id (UUID) this selector was materialized from. Stable for
  // the life of the filter, and the suffix of the Tempo org the agent pushes
  // matching spans to.
  string filter_id = 2;
}

// GetStatus asks the agent to report its current status (reply via CommandResult).
message GetStatus {}

// UpdateConfig pushes an opaque config blob to the agent.
message UpdateConfig { bytes config = 1; }

// GetDiagnosis asks the agent to log its demand-vs-known diagnosis to its own
// log (fire-and-forget; no reply). Admin-only diagnostic: surfaces which
// demanded metric names have no matching series in the known-timeseries cache.
message GetDiagnosis {}

// ---- query tunnel (server -> agent request, agent -> server response) ----
//
// lean-api proxies the UI's edit-mode VictoriaMetrics queries to the agent's
// private local VM over this stream. The agent runs the (read-only, allow-listed)
// HTTP request against its local VM and returns the response. correlation_id pairs
// the QueryRequest with its QueryResponse.

// Header is a single HTTP header with one or more values.
message Header {
  string name = 1;
  repeated string values = 2;
}

// QueryTarget selects which co-located store a QueryRequest runs against.
enum QueryTarget {
  QUERY_TARGET_VM = 0;     // local VictoriaMetrics (default — old peers unaffected)
  QUERY_TARGET_LOKI = 1;   // local Loki (logs edit-mode / agent Explore)
  QUERY_TARGET_TEMPO = 2;  // local Tempo (traces edit-mode / agent Explore)
}

// QueryRequest is a read-only HTTP query the agent runs against a local store
// (VictoriaMetrics, Loki, or Tempo, per target).
message QueryRequest {
  string method = 1;            // "GET" | "POST"
  string path = 2;              // e.g. "/api/v1/query_range" (lean-api strips its own prefix)
  string raw_query = 3;         // URL-encoded query string (GET params)
  bytes body = 4;               // request body (Perses sometimes POSTs query/series)
  repeated Header headers = 5;  // forwarded request headers (Content-Type, Accept)
  QueryTarget target = 6;       // which local store to query (default VM)
}

// QueryResponse carries the agent's local-VM HTTP response (or an agent-side error).
message QueryResponse {
  int32 status_code = 1;        // HTTP status from the local VM (or agent-synthesised)
  bytes body = 2;               // response body
  repeated Header headers = 3;  // response headers (Content-Type, Content-Encoding)
  string error = 4;             // agent-side failure (offline/allowlist/too-large); empty on HTTP success
}

// ---- envelopes ----

// AgentMessage is sent from the agent to lean-api.
message AgentMessage {
  // correlation_id ties this message to an expected Ack (0 = fire-and-forget),
  // or echoes a server command's id when carrying a CommandResult.
  uint64 correlation_id = 1;
  oneof body {
    Hello hello = 2;
    Ping ping = 3;
    IndexCreate index_create = 4;
    IndexUpdate index_update = 5;
    IndexDelete index_delete = 6;
    CommandResult command_result = 7;
    QueryResponse query_response = 8;   // reply to a server-pushed QueryRequest
  }
}

// ServerMessage is sent from lean-api to the agent.
message ServerMessage {
  // correlation_id echoes the agent's id when this is an Ack, or carries a new id
  // for a server command that expects a CommandResult.
  uint64 correlation_id = 1;
  oneof body {
    Pong pong = 2;
    Ack ack = 3;
    DemandSet demand_set = 4;
    GetStatus get_status = 5;
    UpdateConfig update_config = 6;
    QueryRequest query_request = 7;     // proxy the UI's VM query to the agent
    GetDiagnosis get_diagnosis = 8;     // ask the agent for demand-vs-known diagnosis
  }
}
