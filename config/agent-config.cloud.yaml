# =============================================================================
# LeanSignal Agent - CLOUD config (used by `make cloud-run`).
#
# Same shape as agent-config.local.yaml, but the control channel uses real TLS
# (insecure: false) to the tenant's gRPC ingress on 443. The local VM stays on
# the agent's own host — the agent always keeps its full-fidelity store next to
# itself; the cloud reads it back over the gRPC tunnel.
#
# Env (set by `make cloud-run`). Endpoints are BASE URLs; this config appends the
# write path and the agent derives the query path.
#   LEANSIGNAL_ENDPOINT            <tenant>-grpc.eu11.leansignal.io:443  (gRPC over TLS)
#   LEANSIGNAL_AGENT_KEY           <the tenant's agent key>
#   LEANSIGNAL_LOCAL_VM            http://localhost:8482                 (this host's vm-ag base)
#   LEANSIGNAL_DATAPLANE_ENDPOINT  https://<tenant>-ingest.eu11.leansignal.io  (vmauth ingest base)
#   LEANSIGNAL_LOCAL_LOKI          http://localhost:3100                 (this host's local Loki base)
#   LEANSIGNAL_LOKI_ENDPOINT       https://<tenant>-ingest.eu11.leansignal.io  (logs ingest base, same
#                                  origin as the dataplane; path-routed to the tenant Loki)
#   LEANSIGNAL_LOCAL_TEMPO         http://localhost:3200                 (this host's local Tempo query base)
#   LEANSIGNAL_LOCAL_TEMPO_INGEST  http://localhost:4328                 (this host's local Tempo OTLP base —
#                                  the collector owns 4317/4318, so the local Tempo binds 4328)
#   LEANSIGNAL_TEMPO_ENDPOINT      https://<tenant>-ingest.eu11.leansignal.io  (traces ingest base, same
#                                  origin as the dataplane; path-routed to the tenant Tempo)
#
# NOTE: the dataplane path only works once the tenant's vmauth ingest is deployed;
# until then, demanded metrics can't reach the central VM (control + local store
# still work). With no demands nothing is written there, so it's harmless. The
# same applies to the tenant Loki ingest for demanded log streams.
# =============================================================================

extensions:
  health_check:
    endpoint: 127.0.0.1:13133
  leansignal_edge_controller:
    endpoint: "${env:LEANSIGNAL_ENDPOINT}"
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: false       # real TLS — nginx wildcard cert on 443
    reconnect_interval: 5s
    ping_interval: 30s
    # UI edit-mode queries tunnel here; the agent appends /api/v1/query itself.
    local_vm_query_url: "${env:LEANSIGNAL_LOCAL_VM}"
    # UI edit-mode LOG queries tunnel here (QueryRequest target QUERY_TARGET_LOKI).
    local_loki_query_url: "${env:LEANSIGNAL_LOCAL_LOKI}"
    # UI edit-mode TRACE queries tunnel here (QueryRequest target QUERY_TARGET_TEMPO).
    local_tempo_query_url: "${env:LEANSIGNAL_LOCAL_TEMPO}"
    # get_diagnosis writes cache YAML dumps here (defaults to /tmp/leansignal-agent).
    # Point at a mounted volume if you want them to survive a pod restart.
    # diagnostics_dir: /var/lib/leansignal/diagnostics

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  # Loki push (promtail/alloy-style shippers). Loopback-only here, mirroring
  # the OTLP receivers above.
  loki:
    protocols:
      http:
        endpoint: 127.0.0.1:3500
      grpc:
        endpoint: 127.0.0.1:3600
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
processors:
  # Stamp host identity (host.name, os.type). override:false so an OTLP client
  # that already set its own host.name is not clobbered.
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  # Stamp the operator-chosen agent name (set at install via --agent-name).
  resource:
    attributes:
      # insert (not upsert): preserve identity that edge agents already stamped on
      # forwarded data; only set these on this agent's own unlabeled metrics.
      - key: leansignal.agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: leansignal.mode
        value: central
        action: insert
  batch:
    send_batch_size: 5000
    timeout: 1s
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false
  leansignal_demand_filter:
    log_filtered: false
  leansignal_log_demand_filter:
    log_filtered: false
  leansignal_trace_demand_filter:
    log_filtered: false

exporters:
  # This host's "vm-ag" - receives everything. Base URL + write path built here.
  # resource_to_telemetry_conversion promotes resource attributes
  # (leansignal.agent.name, host.name, os.type, leansignal.mode) to per-series
  # labels (leansignal_agent_name, host_name, os_type, leansignal_mode).
  prometheusremotewrite/local:
    endpoint: "${env:LEANSIGNAL_LOCAL_VM}/api/v1/write"
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  # Central dataplane via the tenant's vmauth ingest - only the demanded subset.
  # The agent key is the bearer token vmauth authenticates.
  prometheusremotewrite/dataplane:
    endpoint: "${env:LEANSIGNAL_DATAPLANE_ENDPOINT}/api/v1/write"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    resource_to_telemetry_conversion:
      enabled: true
  # This host's local Loki - receives every log stream (base URL + OTLP logs
  # path built here).
  otlphttp/loki_local:
    logs_endpoint: "${env:LEANSIGNAL_LOCAL_LOKI}/otlp/v1/logs"
  # Tenant Loki via the ingest host - only the demanded streams. The agent key
  # is the bearer token the ingress forward-auth authenticates.
  otlphttp/loki_tenant:
    logs_endpoint: "${env:LEANSIGNAL_LOKI_ENDPOINT}/otlp/v1/logs"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
  # This host's local Tempo - receives every span (base URL + OTLP traces path
  # built here; the local Tempo's OTLP receiver binds 4328, not 4318).
  otlphttp/tempo_local:
    traces_endpoint: "${env:LEANSIGNAL_LOCAL_TEMPO_INGEST}/v1/traces"
    retry_on_failure:
      enabled: true
  # Tenant Tempo via the ingest host - only the demanded resources' spans. The
  # agent key is the bearer token the ingress forward-auth authenticates.
  otlphttp/tempo_tenant:
    traces_endpoint: "${env:LEANSIGNAL_TEMPO_ENDPOINT}/v1/traces"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

connectors:
  forward/demand_filter: {}
  forward/log_demand_filter: {}
  forward/trace_demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller]
  pipelines:
    metrics/all:
      receivers: [otlp, hostmetrics]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]
    logs/all:
      receivers: [otlp, loki]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/loki_local, forward/log_demand_filter]
    logs/filtered:
      receivers: [forward/log_demand_filter]
      processors: [leansignal_log_demand_filter, batch]
      exporters: [otlphttp/loki_tenant]
    traces/all:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/tempo_local, forward/trace_demand_filter]
    traces/filtered:
      receivers: [forward/trace_demand_filter]
      processors: [leansignal_trace_demand_filter, batch]
      exporters: [otlphttp/tempo_tenant]
  telemetry:
    # SELF-MONITORING. The collector's OWN telemetry — metrics, logs AND traces —
    # is pushed via OTLP to the agent's own loopback OTLP receiver (127.0.0.1:4317).
    # It then flows through the same */all pipelines as everything else: written in
    # full to the local store (queryable via "Available") and forwarded to the
    # tenant only when demanded ("Stored"). The agent's own service.name is
    # "leansignal-agent".
    #
    # Logs ALSO keep going to stderr/journald (adding OTLP does not silence the
    # console). `metrics.level: detailed` adds the gRPC/HTTP latency histograms on
    # top of the normal otelcol_* counters. The collector emits very few internal
    # spans by design, so `traces` yields little volume today (wired for future use).
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 15000        # milliseconds (15s), matching the old scrape
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    logs:
      level: info
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
