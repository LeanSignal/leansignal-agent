# =============================================================================
# LeanSignal Agent - CLOUD config (used by `make cloud-run`).
#
# Same shape as agent-config.local.yaml, but the control channel uses real TLS
# (insecure: false) to the tenant's gRPC ingress on 443. The local VM stays on
# the agent's own host — the agent always keeps its full-fidelity store next to
# itself; the cloud reads it back over the gRPC tunnel.
#
# Env (set by `make cloud-run`). Endpoints are BASE URLs; this config appends the
# write path and the agent derives the query path.
#   LEANSIGNAL_ENDPOINT            <tenant>-grpc.eu11.leansignal.io:443  (gRPC over TLS)
#   LEANSIGNAL_AGENT_KEY           <the tenant's agent key>
#   LEANSIGNAL_LOCAL_VM            http://localhost:8482                 (this host's vm-ag base)
#   LEANSIGNAL_DATAPLANE_ENDPOINT  https://<tenant>-ingest.eu11.leansignal.io  (vmauth ingest base)
#
# NOTE: the dataplane path only works once the tenant's vmauth ingest is deployed;
# until then, demanded metrics can't reach the central VM (control + local store
# still work). With no demands nothing is written there, so it's harmless.
# =============================================================================

extensions:
  health_check:
    endpoint: 127.0.0.1:13133
  leansignal_edge_controller:
    endpoint: "${env:LEANSIGNAL_ENDPOINT}"
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: false       # real TLS — nginx wildcard cert on 443
    reconnect_interval: 5s
    ping_interval: 30s
    # UI edit-mode queries tunnel here; the agent appends /api/v1/query itself.
    local_vm_query_url: "${env:LEANSIGNAL_LOCAL_VM}"
    # get_diagnosis writes cache YAML dumps here (defaults to /tmp/leansignal-agent).
    # Point at a mounted volume if you want them to survive a pod restart.
    # diagnostics_dir: /var/lib/leansignal/diagnostics

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
  # Scrape the collector's OWN internal telemetry (otelcol_* self-metrics)
  # exposed on the service.telemetry.metrics endpoint below (in-process loopback).
  # These flow through metrics/all just like any other metric: indexed by the
  # tracker, written in full to the local VM, and forwarded to the dataplane only
  # when demanded.
  prometheus/internal:
    config:
      scrape_configs:
        - job_name: otelcol-self
          scrape_interval: 15s
          static_configs:
            - targets: [127.0.0.1:8888]

processors:
  # Stamp host identity (host.name, os.type). override:false so an OTLP client
  # that already set its own host.name is not clobbered.
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  # Stamp the operator-chosen agent name (set at install via --agent-name).
  resource:
    attributes:
      # insert (not upsert): preserve identity that edge agents already stamped on
      # forwarded data; only set these on this agent's own unlabeled metrics.
      - key: agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: mode
        value: central
        action: insert
  batch:
    send_batch_size: 5000
    timeout: 1s
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false
  leansignal_demand_filter:
    log_filtered: false

exporters:
  # This host's "vm-ag" - receives everything. Base URL + write path built here.
  # resource_to_telemetry_conversion promotes resource attributes (agent.name,
  # host.name, os.type) to per-series labels (agent_name, host_name, os_type).
  prometheusremotewrite/local:
    endpoint: "${env:LEANSIGNAL_LOCAL_VM}/api/v1/write"
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  # Central dataplane via the tenant's vmauth ingest - only the demanded subset.
  # The agent key is the bearer token vmauth authenticates.
  prometheusremotewrite/dataplane:
    endpoint: "${env:LEANSIGNAL_DATAPLANE_ENDPOINT}/api/v1/write"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    resource_to_telemetry_conversion:
      enabled: true

connectors:
  forward/demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller]
  pipelines:
    metrics/all:
      receivers: [otlp, hostmetrics, prometheus/internal]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]
  telemetry:
    # Expose the collector's own metrics on 127.0.0.1:8888 so the
    # prometheus/internal receiver above can scrape them. `detailed` adds the
    # gRPC/HTTP client+server latency histograms on top of the normal counters.
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8888
    logs:
      level: info
