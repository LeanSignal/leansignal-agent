# =============================================================================
# LeanSignal Agent - LOCAL DEVELOPMENT config (used by `make local-run`).
#
# Unlike agent-config.example.yaml (host installs, local VM hard-coded to
# 127.0.0.1:8428), this dev config reads ALL endpoints from the environment so
# `make local-run` can point it at a local lean-api and a local VictoriaMetrics.
#
# Env (set by `make local-run`). Endpoints are VM BASE URLs (scheme://host:port);
# this config appends the write path itself, and the query path is derived by the
# agent — so one base URL drives both write and query for a store.
#   LEANSIGNAL_ENDPOINT            localhost:9090   (local lean-api gRPC, h2c)
#   LEANSIGNAL_AGENT_KEY           deadbeef-dead-beef-dead-beefdeadbeef
#   LEANSIGNAL_LOCAL_VM            http://localhost:8482  (vm-ag base: write + UI query)
#   LEANSIGNAL_DATAPLANE_ENDPOINT  http://localhost:8483  (dataplane base, demanded)
#   LEANSIGNAL_LOCAL_LOKI          http://localhost:3100  (local Loki base: write + UI query)
#   LEANSIGNAL_LOKI_ENDPOINT       http://localhost:3100  (tenant Loki base, demanded)
#   LEANSIGNAL_LOCAL_TEMPO         http://localhost:3200  (local Tempo query base)
#   LEANSIGNAL_LOCAL_TEMPO_INGEST  http://localhost:4328  (local Tempo OTLP base — the
#                                  collector owns 4317/4318, so Tempo binds 4328)
#   LEANSIGNAL_TEMPO_ENDPOINT      http://localhost:4328  (tenant Tempo OTLP base, demanded)
#
# The dataplane writes go straight to a local VM (no vmauth in dev), the
# demanded log streams go to the same local Loki by default (no tenant Loki in
# dev; override LEANSIGNAL_LOKI_ENDPOINT to separate them), and the demanded
# spans go to the same local Tempo by default (override LEANSIGNAL_TEMPO_ENDPOINT
# to separate them).
# =============================================================================

extensions:
  health_check:
    endpoint: 127.0.0.1:13133
  leansignal_edge_controller:
    endpoint: "${env:LEANSIGNAL_ENDPOINT}"
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: true        # local gRPC over h2c (no TLS)
    reconnect_interval: 5s
    ping_interval: 30s
    # UI edit-mode queries tunnel here; the agent appends /api/v1/query itself.
    local_vm_query_url: "${env:LEANSIGNAL_LOCAL_VM}"
    # UI edit-mode LOG queries tunnel here (QueryRequest target QUERY_TARGET_LOKI).
    local_loki_query_url: "${env:LEANSIGNAL_LOCAL_LOKI}"
    # UI edit-mode TRACE queries tunnel here (QueryRequest target QUERY_TARGET_TEMPO).
    local_tempo_query_url: "${env:LEANSIGNAL_LOCAL_TEMPO}"

  # Pause-on-limit valves for the tenant ingest exporters (wired via their
  # `auth` slots): a 403 (ingest limit exceeded) pauses that signal's pushes
  # locally, one probe per retry_interval (default 1m). Inert against the local
  # dev backends (they never 403); kept here so local config mirrors prod.
  leansignal_ingest_backoff/metrics:
  leansignal_ingest_backoff/logs:
  leansignal_ingest_backoff/traces:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317
      http:
        endpoint: 127.0.0.1:4318
  # Loki push (promtail/alloy-style shippers). Loopback-only in dev, mirroring
  # the OTLP receivers above.
  loki:
    protocols:
      http:
        endpoint: 127.0.0.1:3500
      grpc:
        endpoint: 127.0.0.1:3600
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
processors:
  # Stamp host identity (host.name, os.type). override:false so an OTLP client
  # that already set its own host.name is not clobbered.
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  # Stamp the operator-chosen agent name (set at install via --agent-name).
  resource:
    attributes:
      # insert (not upsert): preserve identity that edge agents already stamped on
      # forwarded data; only set these on this agent's own unlabeled metrics.
      - key: leansignal.agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: leansignal.mode
        value: central
        action: insert
  batch:
    send_batch_size: 5000
    timeout: 1s
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false
  leansignal_demand_filter:
    log_filtered: true
  leansignal_log_demand_filter:
    log_filtered: true
  leansignal_trace_demand_filter:
    log_filtered: true

exporters:
  # Local "vm-ag" - receives everything. Base URL + write path built here.
  # resource_to_telemetry_conversion promotes resource attributes
  # (leansignal.agent.name, host.name, os.type, leansignal.mode) to per-series
  # labels (leansignal_agent_name, host_name, os_type, leansignal_mode).
  prometheusremotewrite/local:
    endpoint: "${env:LEANSIGNAL_LOCAL_VM}/api/v1/write"
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    # Synthesized post-demand-filter and redundant under
    # resource_to_telemetry_conversion — would land undemanded in the store.
    target_info:
      enabled: false
  # Dataplane - receives only the demanded subset (points at the same local VM
  # by default in dev; override LEANSIGNAL_DATAPLANE_ENDPOINT to separate them).
  prometheusremotewrite/dataplane:
    endpoint: "${env:LEANSIGNAL_DATAPLANE_ENDPOINT}/api/v1/write"
    auth:
      authenticator: leansignal_ingest_backoff/metrics
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    target_info:
      enabled: false
  # Local Loki - receives every log stream (base URL + OTLP logs path built here).
  otlphttp/loki_local:
    logs_endpoint: "${env:LEANSIGNAL_LOCAL_LOKI}/otlp/v1/logs"
  # "Tenant" Loki - receives only the demanded streams (points at the same local
  # Loki by default in dev; override LEANSIGNAL_LOKI_ENDPOINT to separate them).
  otlphttp/loki_tenant:
    logs_endpoint: "${env:LEANSIGNAL_LOKI_ENDPOINT}/otlp/v1/logs"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    auth:
      authenticator: leansignal_ingest_backoff/logs
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
  # Local Tempo - receives every span (base URL + OTLP traces path built here;
  # the local Tempo's OTLP receiver binds 4328, not 4318).
  otlphttp/tempo_local:
    traces_endpoint: "${env:LEANSIGNAL_LOCAL_TEMPO_INGEST}/v1/traces"
    retry_on_failure:
      enabled: true
  # "Tenant" Tempo - receives only the demanded resources' spans (points at the
  # same local Tempo by default in dev; override LEANSIGNAL_TEMPO_ENDPOINT to
  # separate them).
  otlphttp/tempo_tenant:
    traces_endpoint: "${env:LEANSIGNAL_TEMPO_ENDPOINT}/v1/traces"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    auth:
      authenticator: leansignal_ingest_backoff/traces
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

connectors:
  forward/demand_filter: {}
  forward/log_demand_filter: {}
  forward/trace_demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller, leansignal_ingest_backoff/metrics, leansignal_ingest_backoff/logs, leansignal_ingest_backoff/traces]
  pipelines:
    metrics/all:
      receivers: [otlp, hostmetrics]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]
    logs/all:
      receivers: [otlp, loki]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/loki_local, forward/log_demand_filter]
    logs/filtered:
      receivers: [forward/log_demand_filter]
      processors: [leansignal_log_demand_filter, batch]
      exporters: [otlphttp/loki_tenant]
    traces/all:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/tempo_local, forward/trace_demand_filter]
    traces/filtered:
      receivers: [forward/trace_demand_filter]
      processors: [leansignal_trace_demand_filter, batch]
      exporters: [otlphttp/tempo_tenant]
  telemetry:
    # SELF-MONITORING. The collector's OWN telemetry — metrics, logs AND traces —
    # is pushed via OTLP to the agent's own loopback OTLP receiver (127.0.0.1:4317).
    # It then flows through the same */all pipelines as everything else: written in
    # full to the local store (queryable via "Available") and forwarded to the
    # tenant only when demanded ("Stored"). The agent's own service.name is
    # "leansignal-agent".
    #
    # Logs ALSO keep going to stderr/journald (adding OTLP does not silence the
    # console). `metrics.level: detailed` adds the gRPC/HTTP latency histograms on
    # top of the normal otelcol_* counters. The collector emits very few internal
    # spans by design, so `traces` yields little volume today (wired for future use).
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 15000        # milliseconds (15s), matching the old scrape
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    logs:
      level: info
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
