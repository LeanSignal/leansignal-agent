# =============================================================================
# LeanSignal Agent - example standalone collector configuration
# =============================================================================
#
# This is the config used when running the agent directly on a host (Linux,
# macOS, Windows) via the install scripts. For Kubernetes, use the Helm chart
# under deploy/helm/leansignal-agent instead (it renders an equivalent config).
#
# Data flow:
#   receivers ─▶ leansignalmetrics_tracker ─▶ LOCAL VictoriaMetrics (everything)
#                                          └▶ leansignal_demand_filter ─▶ CENTRAL dataplane
#                                                                          (only demanded series)
#
# Required environment variables (set by the installer / service unit):
#   LEANSIGNAL_ENDPOINT            gRPC control-plane target (host:port), e.g.
#                                  api.leansignal.com:443
#   LEANSIGNAL_AGENT_KEY           Per-agent authentication key (keep secret)
#   LEANSIGNAL_DATAPLANE_ENDPOINT  Prometheus remote-write URL of the central
#                                  ingest (vmauth), e.g. https://ingest.example.com/api/v1/write
#
# The LOCAL VictoriaMetrics endpoint defaults to the co-located single-node VM
# installed alongside the agent (127.0.0.1:8428).
# =============================================================================

extensions:
  # Liveness/readiness endpoint.
  health_check:
    endpoint: 127.0.0.1:13133

  # Maintains the persistent gRPC control stream to LeanSignal:
  #   - reports the discovered metric/timeseries index
  #   - receives the demand list that drives leansignal_demand_filter
  # endpoint is a gRPC target (host:port, no scheme), e.g. api.leansignal.com:443.
  leansignal_edge_controller:
    endpoint: "${env:LEANSIGNAL_ENDPOINT}"
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: false        # true only for local h2c (no TLS)
    reconnect_interval: 5s
    ping_interval: 30s
    # lean-api proxies UI edit-mode queries here; the agent runs them (read-only,
    # allow-listed) against the local VM. Base URL (no /api/v1/write) of the same
    # local VM written to below.
    local_vm_query_url: "http://127.0.0.1:8428"
    # Where the get_diagnosis command writes the cache YAML dumps
    # (KnownTimeseriesCache.yaml, DiscoveredTimeseriesCache.yaml,
    # DemandTimeseriesCache.yaml). Defaults to /tmp/leansignal-agent.
    # diagnostics_dir: /tmp/leansignal-agent

receivers:
  # Accept OTLP from local applications / SDKs, AND from edge agents forwarding to
  # this central agent. Bound to 0.0.0.0 (all interfaces) and unauthenticated by
  # design - keep this host on a trusted/internal network (or firewall :4317/:4318).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Collect host system metrics. These scrapers work on Linux, macOS and Windows.
  # (The `processes` and `process` scrapers are Linux/Windows-only — add them in a
  # platform-specific override; they fail to start on macOS.)
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
      paging: {}

  # Scrape the collector's OWN internal telemetry (otelcol_* self-metrics)
  # exposed on the service.telemetry.metrics endpoint below (in-process loopback).
  # These flow through metrics/all just like any other metric: indexed by the
  # tracker, written in full to the local VM, and forwarded to the central
  # dataplane only when demanded.
  prometheus/internal:
    config:
      scrape_configs:
        - job_name: otelcol-self
          scrape_interval: 15s
          static_configs:
            - targets: [127.0.0.1:8888]

processors:
  batch:
    send_batch_size: 5000
    timeout: 1s

  # Stamp host identity (host.name, os.type). override:false so an OTLP client
  # that already set its own host.name is not clobbered.
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false

  # Stamp the operator-chosen agent name. Set at install via --agent-name; the
  # installer writes LEANSIGNAL_AGENT_NAME into the service environment.
  resource:
    attributes:
      # insert (not upsert): preserve identity that edge agents already stamped on
      # forwarded data; only set these on this agent's own unlabeled metrics.
      - key: agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: mode
        value: central
        action: insert

  # Builds the metric/timeseries index and broadcasts it to the edge controller
  # extension (which syncs it to LeanSignal). Pass-through: mutates nothing.
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false

  # Drops every metric that is not in the current demand list before it reaches
  # the central dataplane. An empty/not-yet-received demand list blocks all.
  leansignal_demand_filter:
    log_filtered: false

exporters:
  # LOCAL VictoriaMetrics - full-fidelity, short retention. Receives everything.
  # resource_to_telemetry_conversion promotes resource attributes (agent.name,
  # host.name, os.type) to per-series labels (agent_name, host_name, os_type).
  prometheusremotewrite/local:
    endpoint: http://127.0.0.1:8428/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true

  # CENTRAL dataplane - long retention. Receives only the demanded subset.
  # Writes go through the vmauth ingest proxy, which authenticates the agent key.
  prometheusremotewrite/dataplane:
    endpoint: "${env:LEANSIGNAL_DATAPLANE_ENDPOINT}"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
    remote_write_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000

connectors:
  # Fans a copy of all metrics from metrics/all into metrics/filtered. No routing
  # logic here - demand filtering happens in the leansignal_demand_filter processor.
  forward/demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller]
  pipelines:
    # Everything: tracked, written to the local VM in full, and forwarded on.
    metrics/all:
      receivers: [otlp, hostmetrics, prometheus/internal]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]

    # Only demanded metrics reach the central dataplane.
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]

  telemetry:
    # Expose the collector's own metrics on 127.0.0.1:8888 so the
    # prometheus/internal receiver above can scrape them. `detailed` adds the
    # gRPC/HTTP client+server latency histograms on top of the normal counters.
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8888
    logs:
      level: info
