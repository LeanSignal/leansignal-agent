# =============================================================================
# LeanSignal Agent - example standalone collector configuration
# =============================================================================
#
# This is the config used when running the agent directly on a host (Linux,
# macOS, Windows) via the install scripts. For Kubernetes, use the Helm chart
# under deploy/helm/leansignal-agent instead (it renders an equivalent config).
#
# Data flow (metrics):
#   receivers ─▶ leansignalmetrics_tracker ─▶ LOCAL VictoriaMetrics (everything)
#                                          └▶ leansignal_demand_filter ─▶ CENTRAL dataplane
#                                                                          (only demanded series)
# Data flow (logs):
#   receivers ─▶ LOCAL Loki (everything, ~1h window)
#             └▶ leansignal_log_demand_filter ─▶ TENANT Loki (only demanded streams)
# Data flow (traces):
#   receivers ─▶ LOCAL Tempo (everything, ~1h window)
#             └▶ leansignal_trace_demand_filter ─▶ TENANT Tempo (only demanded resources' spans)
#
# Required environment variables (set by the installer / service unit):
#   LEANSIGNAL_TENANT              Tenant slug (e.g. "lean"). The backend hosts —
#                                  gRPC control + metrics/logs/traces ingest — are
#                                  NOT set here: the ${leansignal:...} config
#                                  provider resolves the tenant's region from
#                                  control-center at startup and derives every host
#                                  from this slug (see components/resolveprovider).
#   LEANSIGNAL_AGENT_KEY           Per-agent authentication key (keep secret)
#
# Optional (resolve tuning):
#   LEANSIGNAL_CC_URL              control-center origin (default https://cc.leansignal.io)
#   LEANSIGNAL_RESOLVE_AAT         resolve token (has a public default)
#   LEANSIGNAL_DOMAIN              region domain (e.g. eu11.leansignal.io) — set to
#                                  SKIP the control-center lookup entirely
# Optional per-host pins (any single one; the rest stay derived; BASE URLs):
#   LEANSIGNAL_ENDPOINT (grpc host:port), LEANSIGNAL_DATAPLANE_ENDPOINT,
#   LEANSIGNAL_LOKI_ENDPOINT, LEANSIGNAL_TEMPO_ENDPOINT
#
# The LOCAL VictoriaMetrics endpoint defaults to the co-located single-node VM
# installed alongside the agent (127.0.0.1:8428); the LOCAL Loki likewise
# defaults to the co-located instance (127.0.0.1:3100); the LOCAL Tempo defaults
# to the co-located instance (query 127.0.0.1:3200, OTLP ingest 127.0.0.1:4328 —
# the collector itself owns 4317/4318).
# =============================================================================

extensions:
  # Liveness/readiness endpoint.
  health_check:
    endpoint: 127.0.0.1:13133

  # Maintains the persistent gRPC control stream to LeanSignal:
  #   - reports the discovered metric/timeseries index
  #   - receives the demand list that drives leansignal_demand_filter
  # endpoint is a gRPC target (host:port, no scheme), e.g. api.leansignal.com:443.
  leansignal_edge_controller:
    endpoint: "${leansignal:grpc}"
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: false        # true only for local h2c (no TLS)
    reconnect_interval: 5s
    ping_interval: 30s
    # lean-api proxies UI edit-mode queries here; the agent runs them (read-only,
    # allow-listed) against the local VM. Base URL (no /api/v1/write) of the same
    # local VM written to below.
    local_vm_query_url: "http://127.0.0.1:8428"
    # Same, for edit-mode LOG queries: base URL of the co-located local Loki
    # written to below (QueryRequest target QUERY_TARGET_LOKI).
    local_loki_query_url: "http://127.0.0.1:3100"
    # Same, for edit-mode TRACE queries: query base URL of the co-located local
    # Tempo written to below (QueryRequest target QUERY_TARGET_TEMPO).
    local_tempo_query_url: "http://127.0.0.1:3200"
    # Where the get_diagnosis command writes the cache YAML dumps
    # (KnownTimeseriesCache.yaml, DiscoveredTimeseriesCache.yaml,
    # DemandTimeseriesCache.yaml). Defaults to /tmp/leansignal-agent.
    # diagnostics_dir: /tmp/leansignal-agent

  # Pause-on-limit valves for the tenant ingest exporters (wired via each
  # exporter's `auth` slot below). When the ingest edge rejects a push with 403
  # — LeanSignal's "ingest limit exceeded" answer (storage ceiling or monthly
  # ingest budget) — the signal's pushes are suppressed locally (no network
  # traffic, batches dropped as permanent errors) and ONE probe goes out per
  # retry_interval (default 1m); the probe succeeding resumes pushing. One
  # instance per signal so one signal's limit never pauses another. Local
  # fidelity is unaffected — the co-located stores keep receiving everything.
  leansignal_ingest_backoff/metrics:
  leansignal_ingest_backoff/logs:
  leansignal_ingest_backoff/traces:

receivers:
  # Accept OTLP from local applications / SDKs, AND from edge agents forwarding to
  # this central agent. Bound to 0.0.0.0 (all interfaces) and unauthenticated by
  # design - keep this host on a trusted/internal network (or firewall :4317/:4318).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Accept Loki push (promtail/alloy-style shippers) natively, from this host AND
  # from fleet nodes forwarding to this gateway agent. Bound to 0.0.0.0 like the
  # OTLP receivers above - keep on a trusted/internal network (or firewall :3500/:3600).
  loki:
    protocols:
      http:
        endpoint: 0.0.0.0:3500
      grpc:
        endpoint: 0.0.0.0:3600

  # Collect host system metrics. These scrapers work on Linux, macOS and Windows.
  # (The `processes` and `process` scrapers are Linux/Windows-only — add them in a
  # platform-specific override; they fail to start on macOS.)
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
      paging: {}

  # The co-located stores' own /metrics (avm vm_*, aloki loki_*, atempo tempo_*)
  # — agent-stack self-monitoring (local disk usage, ~1h window pressure, ingest
  # errors). Rides metrics/all like everything else: full fidelity locally,
  # forwarded to the tenant only when demanded. Stable job names so demand
  # selectors and dashboards can scope to exactly these series. On installs
  # without a local Loki/Tempo (--no-loki / --no-tempo) the corresponding scrape
  # just reports up=0 — harmless; remove its job if you prefer.
  prometheus/localstores:
    config:
      scrape_configs:
        - job_name: leansignal-avm
          scrape_interval: 30s
          static_configs:
            - targets: [127.0.0.1:8428]
        - job_name: leansignal-aloki
          scrape_interval: 30s
          static_configs:
            - targets: [127.0.0.1:3100]
        - job_name: leansignal-atempo
          scrape_interval: 30s
          static_configs:
            - targets: [127.0.0.1:3200]

processors:
  batch:
    send_batch_size: 5000
    timeout: 1s

  # Stamp host identity (host.name, os.type). override:false so an OTLP client
  # that already set its own host.name is not clobbered.
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false

  # Stamp the operator-chosen agent name. Set at install via --agent-name; the
  # installer writes LEANSIGNAL_AGENT_NAME into the service environment.
  resource:
    attributes:
      # insert (not upsert): preserve identity that edge agents already stamped on
      # forwarded data; only set these on this agent's own unlabeled metrics.
      - key: leansignal.agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: leansignal.mode
        value: central
        action: insert

  # Builds the metric/timeseries index and broadcasts it to the edge controller
  # extension (which syncs it to LeanSignal). Pass-through: mutates nothing.
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false

  # Drops every metric that is not in the current demand list before it reaches
  # the central dataplane. An empty/not-yet-received demand list blocks all.
  leansignal_demand_filter:
    log_filtered: false

  # Drops every log stream whose labels match no demanded LogQL selector before
  # it reaches the tenant Loki. An empty/not-yet-received demand list blocks all.
  leansignal_log_demand_filter:
    log_filtered: false

  # Drops every ResourceSpans group whose resource attributes match no demanded
  # selector before it reaches the tenant Tempo. An empty/not-yet-received
  # demand list blocks all.
  leansignal_trace_demand_filter:
    log_filtered: false

exporters:
  # LOCAL VictoriaMetrics - full-fidelity, short retention. Receives everything.
  # resource_to_telemetry_conversion promotes resource attributes
  # (leansignal.agent.name, host.name, os.type, leansignal.mode) to per-series
  # labels (leansignal_agent_name, host_name, os_type, leansignal_mode).
  prometheusremotewrite/local:
    endpoint: http://127.0.0.1:8428/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true

  # CENTRAL dataplane - long retention. Receives only the demanded subset.
  # Writes go through the vmauth ingest proxy, which authenticates the agent key.
  prometheusremotewrite/dataplane:
    endpoint: "${leansignal:dataplane}/api/v1/write"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    # Pause-on-limit valve (see the extension above); purely a transport
    # wrapper — the Authorization header above is untouched.
    auth:
      authenticator: leansignal_ingest_backoff/metrics
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
    remote_write_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000

  # LOCAL Loki - full-fidelity, ~1h window. Receives every log stream (OTLP
  # native ingest; keeps stream-label construction identical to the tenant Loki).
  otlphttp/loki_local:
    logs_endpoint: http://127.0.0.1:3100/otlp/v1/logs

  # TENANT Loki - long retention. Receives only the demanded streams. The Bearer
  # agent key is the same credential as the metrics dataplane remote-write.
  otlphttp/loki_tenant:
    logs_endpoint: "${leansignal:loki}/otlp/v1/logs"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    auth:
      authenticator: leansignal_ingest_backoff/logs
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

  # LOCAL Tempo - full-fidelity, ~1h window. Receives every span. The local
  # Tempo's OTLP receiver binds 4328 (the collector owns 4317/4318).
  otlphttp/tempo_local:
    traces_endpoint: http://127.0.0.1:4328/v1/traces
    retry_on_failure:
      enabled: true

  # TENANT Tempo - long retention. Receives only the demanded resources' spans.
  # The Bearer agent key is the same credential as the other ingest planes.
  otlphttp/tempo_tenant:
    traces_endpoint: "${leansignal:tempo}/v1/traces"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    auth:
      authenticator: leansignal_ingest_backoff/traces
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

connectors:
  # Fans a copy of all metrics from metrics/all into metrics/filtered. No routing
  # logic here - demand filtering happens in the leansignal_demand_filter processor.
  forward/demand_filter: {}

  # Fans a copy of all logs from logs/all into logs/filtered. No routing logic
  # here - demand filtering happens in the leansignal_log_demand_filter processor.
  forward/log_demand_filter: {}

  # Fans a copy of all traces from traces/all into traces/filtered. No routing logic
  # here - demand filtering happens in the leansignal_trace_demand_filter processor.
  forward/trace_demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller, leansignal_ingest_backoff/metrics, leansignal_ingest_backoff/logs, leansignal_ingest_backoff/traces]
  pipelines:
    # Everything: tracked, written to the local VM in full, and forwarded on.
    # (The collector's own metrics arrive here via OTLP too — see service.telemetry.)
    metrics/all:
      receivers: [otlp, hostmetrics, prometheus/localstores]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]

    # Only demanded metrics reach the central dataplane.
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]

    # Everything: written to the local Loki in full, and forwarded on.
    logs/all:
      receivers: [otlp, loki]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/loki_local, forward/log_demand_filter]

    # Only demanded log streams reach the tenant Loki.
    logs/filtered:
      receivers: [forward/log_demand_filter]
      processors: [leansignal_log_demand_filter, batch]
      exporters: [otlphttp/loki_tenant]

    # Everything: written to the local Tempo in full, and forwarded on.
    traces/all:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/tempo_local, forward/trace_demand_filter]

    # Only demanded resources' spans reach the tenant Tempo.
    traces/filtered:
      receivers: [forward/trace_demand_filter]
      processors: [leansignal_trace_demand_filter, batch]
      exporters: [otlphttp/tempo_tenant]

  telemetry:
    # SELF-MONITORING. The collector's OWN telemetry — metrics, logs AND traces —
    # is pushed via OTLP to the agent's own loopback OTLP receiver (127.0.0.1:4317).
    # It then flows through the same */all pipelines as everything else: written in
    # full to the local store (queryable via "Available") and forwarded to the
    # tenant only when demanded (so it appears under "Stored" once you build a
    # dashboard/alert on it). The agent's own service.name is "leansignal-agent".
    #
    # Notes:
    #  - Logs ALSO keep going to stderr/journald (adding OTLP does not silence the
    #    console), so `journalctl -u leansignal-agent` is unaffected.
    #  - `metrics.level: detailed` adds the gRPC/HTTP client+server latency
    #    histograms on top of the normal otelcol_* counters.
    #  - The collector emits very few internal spans by design, so `traces` yields
    #    little volume today — it is wired for completeness / future spans.
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 15000        # milliseconds (15s), matching the old scrape
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    logs:
      level: info
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://127.0.0.1:4317
