run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/leansignal/leansignal-agent
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    # Test files may be less strict.
    - path: _test\.go
      linters:
        - errcheck
