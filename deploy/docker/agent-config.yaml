# Collector config for the docker-compose trial. The local VM is reached via the
# compose service name "victoriametrics", the local Loki via "loki", and the
# local Tempo via "tempo" (not 127.0.0.1).
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  leansignal_edge_controller:
    endpoint: "${env:LEANSIGNAL_ENDPOINT}"   # gRPC target (host:port)
    agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
    insecure: true                            # local h2c (no TLS)
    reconnect_interval: 5s
    ping_interval: 30s
    local_vm_query_url: "http://victoriametrics:8428"  # UI edit-mode queries tunnel here
    local_loki_query_url: "http://loki:3100"           # UI edit-mode LOG queries tunnel here
    local_tempo_query_url: "http://tempo:3200"         # UI edit-mode TRACE queries tunnel here

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Loki push (promtail/alloy-style shippers), from this host and fleet nodes
  # forwarding to this gateway agent.
  loki:
    protocols:
      http:
        endpoint: 0.0.0.0:3500
      grpc:
        endpoint: 0.0.0.0:3600
  # Scrape the collector's OWN internal telemetry (otelcol_* self-metrics)
  # exposed on the service.telemetry.metrics endpoint below (in-container loopback).
  prometheus/internal:
    config:
      scrape_configs:
        - job_name: otelcol-self
          scrape_interval: 15s
          static_configs:
            - targets: [127.0.0.1:8888]

processors:
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  resource:
    attributes:
      # insert (not upsert): preserve identity edge agents already stamped.
      - key: leansignal.agent.name
        value: "${env:LEANSIGNAL_AGENT_NAME}"
        action: insert
      - key: leansignal.mode
        value: central
        action: insert
  batch:
    send_batch_size: 5000
    timeout: 1s
  leansignalmetrics_tracker:
    log_metrics: false
    log_series: false
  leansignal_demand_filter:
    log_filtered: false
  leansignal_log_demand_filter:
    log_filtered: false
  leansignal_trace_demand_filter:
    log_filtered: false

exporters:
  # resource_to_telemetry_conversion promotes resource attributes
  # (leansignal.agent.name, host.name, os.type, leansignal.mode) to per-series
  # labels (leansignal_agent_name, host_name, os_type, leansignal_mode).
  prometheusremotewrite/local:
    endpoint: http://victoriametrics:8428/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  prometheusremotewrite/dataplane:
    endpoint: "${env:LEANSIGNAL_DATAPLANE_ENDPOINT}"
    resource_to_telemetry_conversion:
      enabled: true
  # Local Loki (compose service) - receives every log stream.
  otlphttp/loki_local:
    logs_endpoint: http://loki:3100/otlp/v1/logs
  # Tenant Loki - only the demanded streams; the agent key is the bearer token.
  otlphttp/loki_tenant:
    logs_endpoint: "${env:LEANSIGNAL_LOKI_ENDPOINT}/otlp/v1/logs"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true
  # Local Tempo (compose service) - receives every span (OTLP on the Tempo
  # container's own 4318).
  otlphttp/tempo_local:
    traces_endpoint: http://tempo:4318/v1/traces
    retry_on_failure:
      enabled: true
  # Tenant Tempo - only the demanded resources' spans; the agent key is the
  # bearer token.
  otlphttp/tempo_tenant:
    traces_endpoint: "${env:LEANSIGNAL_TEMPO_ENDPOINT}/v1/traces"
    headers:
      Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

connectors:
  forward/demand_filter: {}
  forward/log_demand_filter: {}
  forward/trace_demand_filter: {}

service:
  extensions: [health_check, leansignal_edge_controller]
  pipelines:
    metrics/all:
      receivers: [otlp, prometheus/internal]
      processors: [resourcedetection, resource, leansignalmetrics_tracker, batch]
      exporters: [prometheusremotewrite/local, forward/demand_filter]
    metrics/filtered:
      receivers: [forward/demand_filter]
      processors: [leansignal_demand_filter, batch]
      exporters: [prometheusremotewrite/dataplane]
    logs/all:
      receivers: [otlp, loki]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/loki_local, forward/log_demand_filter]
    logs/filtered:
      receivers: [forward/log_demand_filter]
      processors: [leansignal_log_demand_filter, batch]
      exporters: [otlphttp/loki_tenant]
    traces/all:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/tempo_local, forward/trace_demand_filter]
    traces/filtered:
      receivers: [forward/trace_demand_filter]
      processors: [leansignal_trace_demand_filter, batch]
      exporters: [otlphttp/tempo_tenant]
  telemetry:
    # Expose the collector's own metrics on 127.0.0.1:8888 so the
    # prometheus/internal receiver above can scrape them.
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8888
    logs:
      level: info
