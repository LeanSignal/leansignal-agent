# Default values for the leansignal-agent chart.

image:
  repository: ghcr.io/leansignal/leansignal-agent
  # Defaults to the chart appVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent
pullSecrets: []

# -- Number of collector replicas. The edge-controller + tracker assume a single
# process per agent; keep this at 1 unless you understand the deduplication impact.
replicaCount: 1

# Control-plane connection to LeanSignal (the edge-controller extension).
leansignal:
  # Tenant name. When set, the control host and the ingest host are derived as
  # <tenant>-grpc.<domain>:443 and https://<tenant>-ingest.<domain>/api/v1/write.
  # In the common case this (plus the agent key) is all you set.
  tenant: ""
  domain: "eu11.leansignal.io"
  # Human-friendly name for this agent; becomes the agent_name label on every
  # metric. Leave empty to default to the Kubernetes node name (spec.nodeName).
  agentName: ""
  # Deployment mode: "central" (default - full pipeline: local VM, tracker, demand
  # filter, dataplane, control channel) or "edge" (a lightweight OTLP forwarder to
  # a central agent). Setting centralAgentGrpcUrl implies edge.
  mode: central
  # EDGE only: OTLP/gRPC endpoint of the central agent (host:port, plaintext h2c),
  # e.g. central-agent.othernamespace.svc:4317. In edge mode disable the bundled VM
  # (victoria-metrics-single.enabled=false, the default) and --tenant is not needed.
  centralAgentGrpcUrl: ""
  # Advanced: override the derived gRPC control host (host:port, no scheme).
  # Leave empty to derive from tenant/domain.
  endpoint: ""
  # Disable TLS on the control channel (h2c) - only for in-cluster/testing.
  insecure: false
  agentKey:
    # Provide the key inline (stored in a generated Secret)...
    value: ""
    # ...or reference an existing Secret you manage.
    existingSecret: ""
    existingSecretKey: agent-key

# Collector config source. By default the chart renders the config into a
# ConfigMap from the values above (survives pod redeploys and image upgrades).
# Set existingConfigMap to the name of a ConfigMap you manage (with a config.yaml
# key) to own the config out-of-band: the chart then renders no ConfigMap and
# never overwrites yours, so hand edits persist across `helm upgrade`.
config:
  existingConfigMap: ""

# Central, long-retention store that receives only demanded metrics
# (Prometheus remote-write URL).
dataplane:
  # Advanced: override the derived remote-write URL. Leave empty to derive from
  # tenant/domain: https://<tenant>-ingest.<domain>/api/v1/write
  endpoint: ""

# Local, full-fidelity VictoriaMetrics that receives everything.
localVM:
  # Prometheus remote-write endpoint of the local store. When the bundled
  # subchart is enabled, this default targets its service.
  writeEndpoint: ""
  # Query base URL (no /api/v1/write) of the local store. lean-api proxies the
  # UI's edit-mode queries down the control stream and the agent runs them here.
  # Leave empty to derive it from writeEndpoint / the bundled subchart.
  queryEndpoint: ""

# Logs pipelines (demand-driven logging; central mode only). The agent writes
# every log stream to a local Loki (short window) and forwards only the demanded
# streams to the tenant Loki.
logs:
  enabled: true
  # Advanced: override the derived tenant logs-ingest base URL. Leave empty to
  # derive from tenant/domain: https://<tenant>-ingest.<domain> (same ingest
  # host as the metrics dataplane; the exporter appends /otlp/v1/logs).
  tenantEndpoint: ""

# Local, full-fidelity Loki ("aloki") that receives every log stream. By default
# the chart deploys it as its OWN Deployment + ClusterIP Service (the same
# topology as avm / the bundled VictoriaMetrics), so nothing else is needed.
localLoki:
  # Deploy the bundled aloki Deployment (ClusterIP, ~1h window). Turn off to
  # bring your own Loki (then set writeEndpoint/queryEndpoint) or to skip local
  # log storage entirely. Ignored unless logs.enabled and central mode. Setting
  # writeEndpoint also disables the bundled store (you're pointing at your own).
  deploy: true
  image:
    repository: grafana/loki
    tag: "3.5.12"
    pullPolicy: IfNotPresent
  service:
    port: 3100
  # Persistent storage for the local store. Off by default (emptyDir) — the
  # window is short and the data is a disposable local buffer. Enable for a PVC.
  persistence:
    enabled: false
    size: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # OTLP logs push endpoint of the local Loki (…/otlp/v1/logs). Empty → the
  # bundled aloki service (http://<release>-loki.<ns>.svc:3100/otlp/v1/logs).
  writeEndpoint: ""
  # Query base URL (no /otlp/v1/logs) of the local Loki. lean-api proxies the
  # UI's edit-mode LOG queries down the control stream and the agent runs them
  # here. Leave empty to derive it from writeEndpoint / the bundled service.
  queryEndpoint: ""

# Traces pipelines (demand-driven tracing; central mode only). The agent writes
# every span to a local Tempo (short window) and forwards only the demanded
# resources' spans to the tenant Tempo.
traces:
  enabled: true
  # Advanced: override the derived tenant traces-ingest base URL. Leave empty to
  # derive from tenant/domain: https://<tenant>-ingest.<domain> (same ingest
  # host as the metrics dataplane; the exporter appends /v1/traces).
  tenantEndpoint: ""

# Local, full-fidelity Tempo ("atempo") that receives every span. By default the
# chart deploys it as its OWN Deployment + ClusterIP Service (the same topology
# as avm / the bundled VictoriaMetrics), so nothing else is needed.
localTempo:
  # Deploy the bundled atempo Deployment (ClusterIP, ~1h window). Turn off to
  # bring your own Tempo (then set writeEndpoint/queryEndpoint) or to skip local
  # trace storage entirely. Ignored unless traces.enabled and central mode.
  # Setting writeEndpoint also disables the bundled store.
  deploy: true
  image:
    repository: grafana/tempo
    tag: "2.7.1"
    pullPolicy: IfNotPresent
  service:
    # Query API port and OTLP-HTTP ingest port of the atempo service.
    queryPort: 3200
    otlpPort: 4318
  # Persistent storage for the local store. Off by default (emptyDir) — the
  # window is short and the data is a disposable local buffer. Enable for a PVC.
  persistence:
    enabled: false
    size: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # OTLP traces push endpoint of the local Tempo (…/v1/traces). Empty → the
  # bundled atempo service (http://<release>-tempo.<ns>.svc:4318/v1/traces).
  writeEndpoint: ""
  # Query base URL (no /v1/traces) of the local Tempo. lean-api proxies the
  # UI's edit-mode TRACE queries down the control stream and the agent runs
  # them here. Empty → the bundled atempo service (…-tempo.<ns>.svc:3200).
  queryEndpoint: ""

receivers:
  otlp:
    enabled: true
  k8sCluster:
    enabled: true
  kubeletStats:
    enabled: true
  # Loki push protocol (promtail/alloy-style shippers) for the logs/all pipeline.
  loki:
    enabled: true

# Bundled local VictoriaMetrics (upstream victoria-metrics-single chart) — the
# co-located metrics store, deployed by default so a plain install brings up all
# three local stores (VM + the Loki/Tempo sidecars above). Disable for edge mode
# or to point localVM.writeEndpoint at your own VM.
victoria-metrics-single:
  enabled: true
  server:
    retentionPeriod: 1d
    persistentVolume:
      enabled: true
      size: 20Gi

resources:
  requests:
    cpu: "500m"
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

serviceAccount:
  create: true
  name: ""

rbac:
  # Create the ClusterRole/Binding needed by the k8s_cluster + kubeletstats receivers.
  create: true

service:
  # ClusterIP service exposing the OTLP receivers for in-cluster apps.
  type: ClusterIP
  otlpGRPCPort: 4317
  otlpHTTPPort: 4318
  # Loki push receiver ports (rendered only when logs + the loki receiver are enabled).
  lokiHTTPPort: 3500
  lokiGRPCPort: 3600

# OTLP ingress. DEFAULT OFF - exposing the agent's OTLP receivers over ingress is
# NOT a standard use case and, without care, can expose them unauthenticated on the
# public internet. Enable deliberately, and restrict to a private network (e.g.
# Tailscale) via annotations. gRPC and HTTP get SEPARATE ingresses (nginx
# backend-protocol is per-Ingress), each rendered only when its host is set.
ingress:
  enabled: false
  className: nginx
  # Applied to BOTH ingresses. For Tailscale-only access (nginx + source-range gate):
  #   nginx.ingress.kubernetes.io/whitelist-source-range: "100.64.0.0/10,10.42.0.0/24"
  annotations: {}
  # Declare tls.hosts so nginx serves TLS (its default wildcard cert unless
  # tlsSecretName is set).
  tls: true
  tlsSecretName: ""
  grpc:
    host: ""   # e.g. <name>-otlp-grpc.leansignal.io - required to render the gRPC ingress
  http:
    host: ""   # e.g. <name>-otlp-http.leansignal.io - required to render the HTTP ingress

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Extra collector log level: debug | info | warn | error
logLevel: info
