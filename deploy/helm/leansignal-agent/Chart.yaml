apiVersion: v2
name: leansignal-agent
description: LeanSignal Agent - an OpenTelemetry Collector distribution that indexes metrics, writes everything to a co-located VictoriaMetrics, and forwards the demanded subset to a central dataplane.
type: application
# Chart version - bump on chart changes.
version: 0.2.0
# Version of the agent app this chart deploys by default.
appVersion: "0.2.0"
keywords:
  - observability
  - opentelemetry
  - victoriametrics
  - metrics
  - monitoring
home: https://github.com/LeanSignal/leansignal-agent
sources:
  - https://github.com/LeanSignal/leansignal-agent
maintainers:
  - name: LeanSignal
dependencies:
  # Local, full-fidelity VictoriaMetrics ("vms-agent"). Disabled by default;
  # enable it to run a co-located store, or point localVM.writeEndpoint at your own.
  # Bump as desired: `helm search repo vm/victoria-metrics-single --versions`.
  - name: victoria-metrics-single
    version: "0.41.0"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-single.enabled
