apiVersion: v2
name: leansignal-agent
description: LeanSignal Agent - an OpenTelemetry Collector distribution that indexes all three signals, writes everything to co-located VictoriaMetrics/Loki/Tempo, and forwards the demanded subset to a central dataplane.
type: application
# Chart version - bump on chart changes. (The release workflow syncs this and
# appVersion to the git tag; 0.6.3 is the next release carrying this chart change.)
version: 0.6.3
# Version of the agent app this chart deploys by default.
appVersion: "0.6.2"
keywords:
  - observability
  - opentelemetry
  - victoriametrics
  - metrics
  - monitoring
home: https://github.com/LeanSignal/leansignal-agent
sources:
  - https://github.com/LeanSignal/leansignal-agent
maintainers:
  - name: LeanSignal
dependencies:
  # Local, full-fidelity VictoriaMetrics ("vms-agent"). Enabled by default;
  # disable it for edge mode, or point localVM.writeEndpoint at your own.
  # Bump as desired: `helm search repo vm/victoria-metrics-single --versions`.
  - name: victoria-metrics-single
    version: "0.41.0"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-single.enabled
