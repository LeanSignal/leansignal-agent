{{- if not .Values.config.existingConfigMap }}
{{- $mode := include "leansignal-agent.mode" . }}
{{- $logs := and .Values.logs.enabled (eq $mode "central") }}
{{- $traces := and .Values.traces.enabled (eq $mode "central") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leansignal-agent.fullname" . }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    {{- if eq $mode "central" }}
      leansignal_edge_controller:
        endpoint: "${leansignal:grpc}"
        agent_key: "${env:LEANSIGNAL_AGENT_KEY}"
        insecure: {{ .Values.leansignal.insecure | default false }}
        reconnect_interval: 5s
        ping_interval: 30s
        local_vm_query_url: {{ include "leansignal-agent.localVMQueryEndpoint" . | quote }}
    {{- if $logs }}
        local_loki_query_url: {{ include "leansignal-agent.localLokiQueryEndpoint" . | quote }}
    {{- end }}
    {{- if $traces }}
        local_tempo_query_url: {{ include "leansignal-agent.localTempoQueryEndpoint" . | quote }}
    {{- end }}
      # Pause-on-limit valves for the tenant ingest exporters (wired via their
      # `auth` slots): a 403 from the ingest edge (storage limit or monthly
      # ingest budget exceeded) pauses that signal's pushes locally, one probe
      # per retry_interval (default 1m). One instance per signal.
      leansignal_ingest_backoff/metrics:
    {{- if $logs }}
      leansignal_ingest_backoff/logs:
    {{- end }}
    {{- if $traces }}
      leansignal_ingest_backoff/traces:
    {{- end }}
    {{- end }}

    receivers:
    {{- if .Values.receivers.otlp.enabled }}
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    {{- end }}
    {{- if .Values.receivers.k8sCluster.enabled }}
      k8s_cluster:
        collection_interval: 30s
    {{- end }}
    {{- if .Values.receivers.kubeletStats.enabled }}
      kubeletstats:
        collection_interval: 15s
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
    {{- end }}
    {{- if and $logs .Values.receivers.loki.enabled }}
      # Loki push (promtail/alloy-style shippers), from in-cluster apps and
      # fleet nodes forwarding to this gateway agent.
      loki:
        protocols:
          http:
            endpoint: 0.0.0.0:3500
          grpc:
            endpoint: 0.0.0.0:3600
    {{- end }}
    {{- if and (eq $mode "central") .Values.localStores.scrape.enabled }}
      # The co-located stores' own /metrics (avm vm_*, aloki loki_*, atempo
      # tempo_*) — agent-stack self-monitoring. Rides metrics/all like every
      # metric: full fidelity in the local store, forwarded to the tenant only
      # when demanded. Stable job names (leansignal-avm/-aloki/-atempo) so
      # demand selectors and dashboards can scope to exactly these series.
      prometheus/localstores:
        config:
          scrape_configs:
            - job_name: leansignal-avm
              scrape_interval: {{ .Values.localStores.scrape.interval }}
              static_configs:
                - targets: [{{ include "leansignal-agent.localVMScrapeTarget" . | quote }}]
    {{- if $logs }}
            - job_name: leansignal-aloki
              scrape_interval: {{ .Values.localStores.scrape.interval }}
              static_configs:
                - targets: [{{ include "leansignal-agent.localLokiScrapeTarget" . | quote }}]
    {{- end }}
    {{- if $traces }}
            - job_name: leansignal-atempo
              scrape_interval: {{ .Values.localStores.scrape.interval }}
              static_configs:
                - targets: [{{ include "leansignal-agent.localTempoScrapeTarget" . | quote }}]
    {{- end }}
    {{- end }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20
      # Stamp host identity (host.name, os.type). override:false so an OTLP client
      # that already set its own host.name is not clobbered.
      resourcedetection:
        detectors: [env, system]
        system:
          hostname_sources: [os]
        override: false
      # Stamp the operator-chosen agent name (Values.leansignal.agentName, else the
      # node name) and the deployment mode. Promoted to the leansignal_agent_name / leansignal_mode labels.
      # central uses insert (preserve identity edge agents already stamped on
      # forwarded data); edge uses upsert (it is the origin stamping its own).
      resource:
        attributes:
          - key: leansignal.agent.name
            value: "${env:LEANSIGNAL_AGENT_NAME}"
            action: {{ if eq $mode "central" }}insert{{ else }}upsert{{ end }}
          - key: leansignal.mode
            value: {{ $mode }}
            action: {{ if eq $mode "central" }}insert{{ else }}upsert{{ end }}
      batch:
        send_batch_size: 5000
        timeout: 1s
    {{- if eq $mode "central" }}
      leansignalmetrics_tracker:
        log_metrics: false
        log_series: false
      leansignal_demand_filter:
        log_filtered: false
    {{- end }}
    {{- if $logs }}
      leansignal_log_demand_filter:
        log_filtered: false
    {{- end }}
    {{- if $traces }}
      leansignal_trace_demand_filter:
        log_filtered: false
    {{- end }}

    exporters:
    {{- if eq $mode "central" }}
      # resource_to_telemetry_conversion promotes resource attributes
      # (leansignal.agent.name, host.name, os.type, leansignal.mode) to per-series labels.
      prometheusremotewrite/local:
        endpoint: {{ include "leansignal-agent.localVMEndpoint" . | quote }}
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: true
        retry_on_failure:
          enabled: true
      prometheusremotewrite/dataplane:
        endpoint: "${leansignal:dataplane}/api/v1/write"
        headers:
          Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
        auth:
          authenticator: leansignal_ingest_backoff/metrics
        resource_to_telemetry_conversion:
          enabled: true
        retry_on_failure:
          enabled: true
        remote_write_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
    {{- if $logs }}
      # LOCAL Loki - full-fidelity, short window. Receives every log stream.
      otlphttp/loki_local:
        logs_endpoint: {{ include "leansignal-agent.localLokiEndpoint" . | quote }}
        retry_on_failure:
          enabled: true
      # TENANT Loki - only the demanded streams; the agent key is the bearer token.
      otlphttp/loki_tenant:
        logs_endpoint: "${leansignal:loki}/otlp/v1/logs"
        headers:
          Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
        auth:
          authenticator: leansignal_ingest_backoff/logs
        retry_on_failure:
          enabled: true
        sending_queue:
          enabled: true
    {{- end }}
    {{- if $traces }}
      # LOCAL Tempo - full-fidelity, short window. Receives every span.
      otlphttp/tempo_local:
        traces_endpoint: {{ include "leansignal-agent.localTempoEndpoint" . | quote }}
        retry_on_failure:
          enabled: true
      # TENANT Tempo - only the demanded resources' spans, ONE ORG PER TRACE
      # INGESTION RULE. The router pushes to /v1/traces/r/<filter-id>, which
      # lean-api forward-auths into `X-Scope-OrgID: <tenant>__<filter-id>`, so a
      # deleted rule can have exactly its spans expired — Tempo cannot delete a
      # subset of an org. The agent key is the bearer, as on every ingest plane.
      leansignal_trace_router:
        endpoint: "${leansignal:tempo}"
        headers:
          Authorization: "Bearer ${env:LEANSIGNAL_AGENT_KEY}"
        timeout: 30s
    {{- end }}
    {{- else }}
      # Edge mode: forward everything to the central agent's OTLP gRPC receiver
      # (plaintext h2c on the internal network). No local VM, tracker, or dataplane.
      otlp/central:
        endpoint: "${env:CENTRAL_AGENT_GRPC_URL}"
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
    {{- end }}

    {{- if eq $mode "central" }}
    connectors:
      forward/demand_filter: {}
    {{- if $logs }}
      forward/log_demand_filter: {}
    {{- end }}
    {{- if $traces }}
      forward/trace_demand_filter: {}
    {{- end }}
    {{- end }}

    service:
    {{- if eq $mode "central" }}
      extensions: [health_check, leansignal_edge_controller, leansignal_ingest_backoff/metrics{{ if $logs }}, leansignal_ingest_backoff/logs{{ end }}{{ if $traces }}, leansignal_ingest_backoff/traces{{ end }}]
    {{- else }}
      extensions: [health_check]
    {{- end }}
      pipelines:
        metrics/all:
          receivers: [{{ include "leansignal-agent.metricsReceivers" . }}]
    {{- if eq $mode "central" }}
          processors: [memory_limiter, resourcedetection, resource, leansignalmetrics_tracker, batch]
          exporters: [prometheusremotewrite/local, forward/demand_filter]
        metrics/filtered:
          receivers: [forward/demand_filter]
          processors: [leansignal_demand_filter, batch]
          exporters: [prometheusremotewrite/dataplane]
    {{- if $logs }}
        # Everything: written to the local Loki in full, and forwarded on.
        logs/all:
          receivers: [{{ include "leansignal-agent.logsReceivers" . }}]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/loki_local, forward/log_demand_filter]
        # Only demanded log streams reach the tenant Loki.
        logs/filtered:
          receivers: [forward/log_demand_filter]
          processors: [leansignal_log_demand_filter, batch]
          exporters: [otlphttp/loki_tenant]
    {{- end }}
    {{- if $traces }}
        # Everything: written to the local Tempo in full, and forwarded on.
        traces/all:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/tempo_local, forward/trace_demand_filter]
        # Only demanded resources' spans reach the tenant Tempo.
        traces/filtered:
          receivers: [forward/trace_demand_filter]
          processors: [leansignal_trace_demand_filter, batch]
          exporters: [leansignal_trace_router]
    {{- end }}
    {{- else }}
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlp/central]
    {{- end }}
      telemetry:
        # SELF-MONITORING. The collector's OWN telemetry — metrics, logs AND
        # traces — is pushed via OTLP to the pod's own loopback OTLP receiver
        # (127.0.0.1:4317), flowing through the same */all pipelines as everything
        # else: full to the local store ("Available"), forwarded to the tenant only
        # when demanded ("Stored"). service.name is "leansignal-agent". Logs also
        # keep going to stderr for `kubectl logs`.
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 15000
                exporter:
                  otlp:
                    protocol: grpc
                    endpoint: http://127.0.0.1:4317
        logs:
          level: {{ .Values.logLevel }}
          processors:
            - batch:
                exporter:
                  otlp:
                    protocol: grpc
                    endpoint: http://127.0.0.1:4317
        traces:
          processors:
            - batch:
                exporter:
                  otlp:
                    protocol: grpc
                    endpoint: http://127.0.0.1:4317
{{- end }}
