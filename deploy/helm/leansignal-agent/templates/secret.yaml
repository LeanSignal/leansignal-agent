{{- if not .Values.leansignal.agentKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leansignal-agent.agentKeySecretName" . }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  agent-key: {{ required "Set leansignal.agentKey.value or leansignal.agentKey.existingSecret" .Values.leansignal.agentKey.value | quote }}
{{- end }}
