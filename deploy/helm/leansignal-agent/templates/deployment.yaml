apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leansignal-agent.fullname" . }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "leansignal-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "leansignal-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "leansignal-agent.serviceAccountName" . }}
      {{- with .Values.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "leansignal-agent.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/leansignal-agent/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: health, containerPort: 13133 }
            {{- if and .Values.logs.enabled .Values.receivers.loki.enabled (eq (include "leansignal-agent.mode" .) "central") }}
            - { name: loki-http, containerPort: 3500 }
            - { name: loki-grpc, containerPort: 3600 }
            {{- end }}
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # agent_name label source: explicit value, else the node name.
            - name: LEANSIGNAL_AGENT_NAME
              {{- if .Values.leansignal.agentName }}
              value: {{ .Values.leansignal.agentName | quote }}
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
              {{- end }}
            # The backend hosts are resolved by the ${leansignal:...} config
            # provider from the tenant slug. It calls control-center's
            # /resolve_tenant at startup to learn the region, UNLESS a region is
            # pinned via LEANSIGNAL_DOMAIN below.
            - name: LEANSIGNAL_TENANT
              value: {{ .Values.leansignal.tenant | quote }}
            {{- if .Values.leansignal.domain }}
            # Region pinned → the provider skips the control-center lookup.
            - name: LEANSIGNAL_DOMAIN
              value: {{ .Values.leansignal.domain | quote }}
            {{- end }}
            {{- if .Values.leansignal.ccUrl }}
            - name: LEANSIGNAL_CC_URL
              value: {{ .Values.leansignal.ccUrl | quote }}
            {{- end }}
            {{- if .Values.leansignal.resolveAat }}
            - name: LEANSIGNAL_RESOLVE_AAT
              value: {{ .Values.leansignal.resolveAat | quote }}
            {{- end }}
            # Optional per-host pins (BASE URLs). Each, when set, is returned by the
            # provider verbatim and skips resolution for that one host — e.g. an
            # in-cluster gRPC/metrics endpoint while logs/traces stay derived.
            {{- if .Values.leansignal.endpoint }}
            - name: LEANSIGNAL_ENDPOINT
              value: {{ .Values.leansignal.endpoint | quote }}
            {{- end }}
            {{- if .Values.dataplane.endpoint }}
            - name: LEANSIGNAL_DATAPLANE_ENDPOINT
              value: {{ .Values.dataplane.endpoint | quote }}
            {{- end }}
            {{- if .Values.logs.tenantEndpoint }}
            - name: LEANSIGNAL_LOKI_ENDPOINT
              value: {{ .Values.logs.tenantEndpoint | quote }}
            {{- end }}
            {{- if .Values.traces.tenantEndpoint }}
            - name: LEANSIGNAL_TEMPO_ENDPOINT
              value: {{ .Values.traces.tenantEndpoint | quote }}
            {{- end }}
            # Edge mode only (empty in central mode): the central agent's OTLP endpoint.
            - name: CENTRAL_AGENT_GRPC_URL
              value: {{ .Values.leansignal.centralAgentGrpcUrl | quote }}
            - name: LEANSIGNAL_AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "leansignal-agent.agentKeySecretName" . }}
                  key: {{ .Values.leansignal.agentKey.existingSecretKey | default "agent-key" }}
          livenessProbe:
            httpGet: { path: /, port: health }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /, port: health }
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/leansignal-agent
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "leansignal-agent.configMapName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
