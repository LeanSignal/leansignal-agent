{{- $mode := include "leansignal-agent.mode" . }}
{{- $traces := and .Values.traces.enabled (eq $mode "central") }}
{{- if and $traces .Values.localTempo.deploy (not .Values.localTempo.writeEndpoint) }}
{{- $name := printf "%s-tempo" (include "leansignal-agent.fullname" .) }}
# Co-located local Tempo ("atempo") — the traces twin of the bundled
# VictoriaMetrics. A normal single-replica Deployment + ClusterIP Service (the
# same topology as avm), reached in-cluster over service DNS. Single binary
# (monolithic), short (~1h) window; lean-api reads it over the agent's gRPC
# query tunnel. OTLP HTTP ingest on 4318, query API on 3200.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yaml: |
    server:
      http_listen_address: 0.0.0.0
      http_listen_port: 3200
      grpc_listen_address: 0.0.0.0
      grpc_listen_port: 9097

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/lib/tempo/blocks
        wal:
          path: /var/lib/tempo/wal

    # The "~1h window" is APPROXIMATE by design: Tempo has no query-lookback
    # bound (unlike the local Loki's max_query_lookback), deletion is
    # compaction-driven and block-granular, and recent spans live in the
    # ingester before blocks cut. block_retention bounds disk usage.
    compactor:
      compaction:
        block_retention: 1h

    usage_report:
      reporting_enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  type: ClusterIP
  selector:
    {{- include "leansignal-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
  ports:
    - name: http
      port: {{ .Values.localTempo.service.queryPort }}
      targetPort: http
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.localTempo.service.otlpPort }}
      targetPort: otlp-http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  replicas: 1
  # RWO volume: never run two pods on the same store at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "leansignal-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.localTempo | sha256sum }}
      labels:
        {{- include "leansignal-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tempo
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: tempo
          image: "{{ .Values.localTempo.image.repository }}:{{ .Values.localTempo.image.tag }}"
          imagePullPolicy: {{ .Values.localTempo.image.pullPolicy }}
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - { name: http, containerPort: 3200 }
            - { name: otlp-http, containerPort: 4318 }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.localTempo.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/lib/tempo
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
        - name: data
        {{- if .Values.localTempo.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.localTempo.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.localTempo.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.localTempo.persistence.size }}
{{- end }}
{{- end }}
