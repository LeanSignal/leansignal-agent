{{- $mode := include "leansignal-agent.mode" . }}
{{- $logs := and .Values.logs.enabled (eq $mode "central") }}
{{- if and $logs .Values.localLoki.deploy (not .Values.localLoki.writeEndpoint) }}
{{- $name := printf "%s-loki" (include "leansignal-agent.fullname" .) }}
# Co-located local Loki ("aloki") — the logs twin of the bundled VictoriaMetrics.
# A normal single-replica Deployment + ClusterIP Service (the same topology as
# avm), reached in-cluster over service DNS. Single binary, short (~1h) window;
# lean-api reads it over the agent's gRPC query tunnel. Native OTLP ingestion at
# /otlp/v1/logs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_address: 0.0.0.0
      http_listen_port: 3100
      grpc_listen_address: 0.0.0.0
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /var/lib/loki
      storage:
        filesystem:
          chunks_directory: /var/lib/loki/chunks
          rules_directory: /var/lib/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2026-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    # The "1h window", enforced in two layers:
    #   - max_query_lookback makes the LOGICAL window exact: queries cannot see
    #     past it, and ingest rejects backfill beyond it.
    #   - retention_period (~2x the window) merely bounds disk usage; Loki
    #     deletion is compactor-driven and chunk-granular.
    limits_config:
      max_query_lookback: 1h
      reject_old_samples: true
      reject_old_samples_max_age: 1h
      retention_period: 2h

    compactor:
      working_directory: /var/lib/loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
      retention_delete_delay: 10m

    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  type: ClusterIP
  selector:
    {{- include "leansignal-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: loki
  ports:
    - name: http
      port: {{ .Values.localLoki.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  replicas: 1
  # RWO volume: never run two pods on the same store at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "leansignal-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: loki
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.localLoki | sha256sum }}
      labels:
        {{- include "leansignal-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: loki
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: "{{ .Values.localLoki.image.repository }}:{{ .Values.localLoki.image.tag }}"
          imagePullPolicy: {{ .Values.localLoki.image.pullPolicy }}
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - { name: http, containerPort: 3100 }
            - { name: grpc, containerPort: 9096 }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.localLoki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /var/lib/loki
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
        - name: data
        {{- if .Values.localLoki.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.localLoki.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  labels:
    {{- include "leansignal-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.localLoki.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.localLoki.persistence.size }}
{{- end }}
{{- end }}
