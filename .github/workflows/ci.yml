name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go build & test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Persistent self-hosted runner: caches persist on local disk, so skip
          # setup-go's slow multi-GB actions/cache upload (see release.yml).
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        # Single source of truth: `make test` runs both modules (root ./... +
        # proto) with -race, so CI can't drift from local. See Makefile.
        run: make test

      - name: License headers
        run: |
          go install github.com/google/addlicense@latest
          "$(go env GOPATH)/bin/addlicense" -check -s -l apache -c "LeanSignal" -y 2026 components/

  golangci:
    name: golangci-lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Persistent self-hosted runner: GOCACHE/GOMODCACHE persist on local
          # disk, so skip setup-go's multi-GB actions/cache download+upload.
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint v2 (v2-schema .golangci.yml). Keep in sync with
          # GOLANGCI_VERSION in the Makefile so local `make lint` == CI.
          version: v2.12.2
          # Same reason: ~/.cache/golangci-lint + Go build cache persist on the
          # runner's disk, so don't push/pull them through GitHub's cache service.
          skip-cache: true

  ocb:
    name: OCB generate + compile
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Persistent self-hosted runner: caches persist on local disk, so skip
          # setup-go's slow multi-GB actions/cache upload (see release.yml).
          cache: false
      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.141.0
      - name: Generate distribution
        run: "$(go env GOPATH)/bin/builder --config manifest.yaml --skip-compilation"
      - name: Compile distribution
        run: cd _build && CGO_ENABLED=0 go build -trimpath -o leansignal-agent .

  helm:
    name: Helm lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v5
      - name: Lint chart
        run: |
          helm dependency update deploy/helm/leansignal-agent
          helm lint deploy/helm/leansignal-agent
          helm template lsa deploy/helm/leansignal-agent \
            -f deploy/helm/leansignal-agent/values-example.yaml >/dev/null

  shellcheck:
    name: Shellcheck installers
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Fail only on errors; benign warnings/info (unused-var, A&&B||C) don't block.
          shellcheck --severity=error scripts/install/*.sh scripts/release/*.sh
