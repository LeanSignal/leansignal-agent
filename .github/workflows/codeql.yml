name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: self-hosted
    # Code scanning (CodeQL upload) needs GitHub Advanced Security, which is free
    # on public repos but not available on private repos without a GHAS license.
    # Skip (don't fail) while the repo is private; this auto-enables when it's public.
    if: github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Persistent self-hosted runner: GOCACHE/GOMODCACHE persist on local
          # disk, so skip setup-go's multi-GB actions/cache download+upload.
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build
        run: go build ./components/...

      - name: Analyze
        uses: github/codeql-action/analyze@v4
