name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create releases / upload assets
  packages: write   # push images + chart to ghcr

jobs:
  # Single job on the big self-hosted runner. goreleaser cross-compiles every
  # platform AND builds the multi-arch images in one pass — the arm64 image is a
  # COPY-only Dockerfile (no RUN steps), so QEMU here is nearly free. Then the VM
  # bundles are built and attached to the same release.
  release:
    name: Build & publish release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.141.0

      - name: Stamp agent version from tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Override dist.version (the only '^  version:' line) so the binary's
          # --version reports the release tag.
          sed -i -E "s/^  version: .*/  version: ${VER}/" manifest.yaml
          grep -m1 '^  version:' manifest.yaml

      - name: Generate distribution sources
        run: |
          "$(go env GOPATH)/bin/builder" --config manifest.yaml --skip-compilation
          # The stamp step above modified the tracked manifest.yaml; that version is
          # now baked into the gitignored _build/, so restore the manifest to leave a
          # clean working tree. goreleaser refuses to release from a dirty tree, and
          # for any tag whose version differs from the committed manifest (e.g. an rc)
          # the stamp is a real change — so this restore is required, not cosmetic.
          git checkout -- manifest.yaml
          git status --porcelain

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          # -p 4: build up to 4 targets at once. Each full-contrib link peaks
          # ~5 GB RAM, so -p 4 needs ~20 GB — safe on a 32 GB runner. Lower to -p 2
          # if the runner has <24 GB RAM; the OOM on the old 7 GB hosted runner is
          # why this cap exists at all.
          args: release --clean -p 4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build VM bundles & re-host VM archives
        env:
          VERSION: ${{ github.ref_name }}
          STRICT_VM: "1"
        run: |
          # zip/unzip are used by build-bundles.sh; install only if the runner
          # doesn't already have them (self-hosted images vary).
          if ! command -v zip >/dev/null || ! command -v unzip >/dev/null; then
            sudo apt-get update && sudo apt-get install -y zip unzip
          fi
          # strip leading 'v' for artifact naming consistency with goreleaser
          export VERSION="${VERSION#v}"
          bash scripts/release/build-bundles.sh

      - name: Upload bundles to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" bundles/* --clobber

  helm:
    name: Publish Helm chart
    runs-on: self-hosted
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Package & push chart (OCI)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Sync chart version + appVersion to the release tag.
          sed -i -E "s/^version: .*/version: ${VER}/" deploy/helm/leansignal-agent/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: \"${VER}\"/" deploy/helm/leansignal-agent/Chart.yaml
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm dependency update deploy/helm/leansignal-agent
          helm package deploy/helm/leansignal-agent -d .helm-out
          helm push .helm-out/*.tgz oci://ghcr.io/leansignal/charts
