name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create releases / upload assets
  packages: write   # push images + chart to ghcr

jobs:
  # 1) Cross-compile every platform + publish the GitHub release (binaries,
  #    archives, checksums, VM bundles). No Docker here — images are built
  #    natively per-arch in the `image` matrix below, from these archives.
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      # goreleaser cross-compiles the full Contrib distribution for every
      # platform — reclaim ~20 GB of unused toolchains so the runner's disk
      # doesn't fill up ("no space left on device").
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.141.0

      - name: Stamp agent version from tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Override dist.version (the only '^  version:' line) so the binary's
          # --version reports the release tag.
          sed -i -E "s/^  version: .*/  version: ${VER}/" manifest.yaml
          grep -m1 '^  version:' manifest.yaml

      - name: Generate distribution sources
        run: "$(go env GOPATH)/bin/builder --config manifest.yaml --skip-compilation"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          # -p 1: build one target at a time. Each full-contrib binary (~487 MB)
          # link is multi-GB of RAM; the default parallel build OOM-kills the 7 GB
          # hosted runner. Serializing keeps peak memory under the limit.
          args: release --clean -p 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build VM bundles & re-host VM archives
        env:
          VERSION: ${{ github.ref_name }}
          STRICT_VM: "1"
        run: |
          sudo apt-get update && sudo apt-get install -y zip unzip
          # strip leading 'v' for artifact naming consistency with goreleaser
          export VERSION="${VERSION#v}"
          bash scripts/release/build-bundles.sh

      - name: Upload bundles to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" bundles/* --clobber

  # 2) Build the container image for each arch on its OWN native runner (no QEMU
  #    emulation): amd64 on ubuntu-latest, arm64 on the free public ubuntu-24.04-arm.
  #    The image is just the goreleaser-built binary copied into distroless, so we
  #    pull that arch's archive from the release and `docker build` it natively.
  image:
    name: Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4   # provides Dockerfile + config/agent-config.example.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the ${{ matrix.arch }} binary from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "leansignal-agent_*_linux_${{ matrix.arch }}.tar.gz" \
            --dir dist-dl
          # goreleaser puts the binary at the archive root; extract just it into
          # the repo root, next to Dockerfile + config/ from the checkout.
          tar -xzf dist-dl/*.tar.gz -C . leansignal-agent
          test -x ./leansignal-agent

      - name: Build & push native ${{ matrix.arch }} image
        run: |
          IMAGE=ghcr.io/leansignal/leansignal-agent
          VER="${GITHUB_REF_NAME#v}"
          # Native build for the runner's arch — no --platform, no QEMU. The
          # distroless base is pulled for the matching arch automatically.
          docker build -f Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/LeanSignal/leansignal-agent" \
            --label "org.opencontainers.image.version=${VER}" \
            --label "org.opencontainers.image.licenses=Apache-2.0" \
            -t "${IMAGE}:${VER}-${{ matrix.arch }}" \
            -t "${IMAGE}:latest-${{ matrix.arch }}" \
            .
          docker push "${IMAGE}:${VER}-${{ matrix.arch }}"
          docker push "${IMAGE}:latest-${{ matrix.arch }}"

  # 3) Merge the two per-arch images into one multi-arch manifest (the tags
  #    users actually pull: :<version> and :latest).
  manifest:
    name: Multi-arch manifest
    runs-on: ubuntu-latest
    needs: image
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create & push multi-arch manifests
        run: |
          IMAGE=ghcr.io/leansignal/leansignal-agent
          VER="${GITHUB_REF_NAME#v}"
          docker buildx imagetools create -t "${IMAGE}:${VER}" \
            "${IMAGE}:${VER}-amd64" "${IMAGE}:${VER}-arm64"
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" "${IMAGE}:latest-arm64"

  helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Package & push chart (OCI)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Sync chart version + appVersion to the release tag.
          sed -i -E "s/^version: .*/version: ${VER}/" deploy/helm/leansignal-agent/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: \"${VER}\"/" deploy/helm/leansignal-agent/Chart.yaml
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm dependency update deploy/helm/leansignal-agent
          helm package deploy/helm/leansignal-agent -d .helm-out
          helm push .helm-out/*.tgz oci://ghcr.io/leansignal/charts
