name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create releases / upload assets
  packages: write   # push images + chart to ghcr

jobs:
  # Single job on the self-hosted runner (which now has Docker): goreleaser
  # cross-compiles every platform AND builds + pushes the multi-arch images, then
  # the VM bundles are attached. The arm64 image is a COPY-only Dockerfile, so the
  # QEMU emulation the Set up QEMU step registers is barely exercised.
  release:
    name: Build & publish release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # false: this is a PERSISTENT self-hosted runner, so GOCACHE/GOMODCACHE
          # already survive between runs on local disk. setup-go's actions/cache
          # integration would otherwise tar+upload ~6 GB of full-contrib cache to
          # GitHub every run (10-15 min of post-job overhead) for zero benefit.
          cache: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          # Persistent self-hosted runner: the binfmt image already stays in the
          # local Docker store between runs, so skip caching it to GitHub Actions
          # (a redundant ~32 MB upload/download every release).
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.141.0

      - name: Stamp agent version from tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Override dist.version (the only '^  version:' line) so the binary's
          # --version reports the release tag.
          sed -i -E "s/^  version: .*/  version: ${VER}/" manifest.yaml
          grep -m1 '^  version:' manifest.yaml

      - name: Generate distribution sources
        run: |
          "$(go env GOPATH)/bin/builder" --config manifest.yaml --skip-compilation
          # The stamp step above modified the tracked manifest.yaml; that version is
          # now baked into the gitignored _build/, so restore the manifest to leave a
          # clean working tree. goreleaser refuses to release from a dirty tree, and
          # for any tag whose version differs from the committed manifest (e.g. an rc)
          # the stamp is a real change — so this restore is required, not cosmetic.
          git checkout -- manifest.yaml
          git status --porcelain

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          # -p 6: build all targets in parallel (there are 5). ~5-6 GB RAM each, so
          # ≈30 GB — fine on the 48 GB / 12-CPU runner.
          args: release --clean -p 6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Go's build temp defaults to /tmp, a small tmpfs on this runner; five
          # parallel full-contrib builds exhaust it. Redirect to the disk-backed
          # work volume (same fs as GOCACHE, which has space).
          GOTMPDIR: ${{ runner.temp }}
          TMPDIR: ${{ runner.temp }}

      - name: Build VM bundles & re-host VM archives
        env:
          VERSION: ${{ github.ref_name }}
          STRICT_VM: "1"
        run: |
          # zip/unzip are used by build-bundles.sh; install only if missing
          # (self-hosted runner images vary).
          if ! command -v zip >/dev/null || ! command -v unzip >/dev/null; then
            sudo apt-get update && sudo apt-get install -y zip unzip
          fi
          # strip leading 'v' for artifact naming consistency with goreleaser
          export VERSION="${VERSION#v}"
          bash scripts/release/build-bundles.sh

      - name: Upload bundles to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" bundles/* --clobber
          else
            # Minimal self-hosted runner without gh: upload via the GitHub API.
            # (This is an expected fallback, not an error — install gh on the
            # runner to use the gh path instead.)
            echo "note: gh CLI not installed; uploading bundles via the GitHub API (expected, fine)"
            # Capture the release JSON fully first. Piping curl straight into
            # `grep -m1` closes the pipe early, so curl dies with error 23
            # (write failure) under `set -o pipefail`. A here-string can't SIGPIPE.
            rel_json="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")"
            up="$(grep -m1 '"upload_url"' <<<"$rel_json" | sed -E 's/.*"upload_url": *"([^"{]+).*/\1/')"
            for f in bundles/*; do
              name="$(basename "$f")"
              echo "  uploading ${name}"
              curl -fsSL -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"${f}" \
                "${up}?name=${name}" >/dev/null
            done
          fi

  helm:
    name: Publish Helm chart
    runs-on: self-hosted
    needs: release
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5

      - name: Package & push chart (OCI)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Sync chart version + appVersion to the release tag.
          sed -i -E "s/^version: .*/version: ${VER}/" deploy/helm/leansignal-agent/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: \"${VER}\"/" deploy/helm/leansignal-agent/Chart.yaml
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm dependency update deploy/helm/leansignal-agent
          helm package deploy/helm/leansignal-agent -d .helm-out
          helm push .helm-out/*.tgz oci://ghcr.io/leansignal/charts
